name: Release Eesha

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-release.yml'

permissions:
  contents: write

env:
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dsherret/rust-toolchain-file@v1

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.8

      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=/usr/lib/llvm-14/lib" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt install build-essential python3-pip ccache clang cmake curl \
            g++ git gperf libdbus-1-dev libfreetype6-dev libgl1-mesa-dri \
            libgles2-mesa-dev libglib2.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good libgstreamer-plugins-good1.0-dev \
            gstreamer1.0-plugins-bad libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-plugins-ugly gstreamer1.0-plugins-base \
            libgstreamer-plugins-base1.0-dev gstreamer1.0-libav \
            libgstrtspserver-1.0-dev gstreamer1.0-tools libges-1.0-dev \
            libharfbuzz-dev liblzma-dev libunwind-dev libvulkan1 \
            libx11-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxmu-dev libxmu6 libegl1-mesa-dev llvm-dev m4 xorg-dev sway \
            python3-mako

      - name: Build
        env:
          SCCACHE_GHA_ENABLED: true
          RUSTC_WRAPPER: sccache
        run: cargo build --features embed-useragent-stylesheets --release

      - name: Make archive
        run: |
          mkdir -p eesha-release
          cp target/release/eesha eesha-release/
          cp -r resources eesha-release/
          cp -r icons eesha-release/
          cd eesha-release && tar -czvf ../eesha-x86_64-unknown-linux-gnu.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eesha-x86_64-unknown-linux-gnu
          path: ./eesha-x86_64-unknown-linux-gnu.tar.gz

  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dsherret/rust-toolchain-file@v1

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.8

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install mako
        run: python -m pip install mako

      - name: Install scoop
        uses: MinoruSekine/setup-scoop@v4

      - name: Install dependencies
        run: |
          scoop install cmake

      - name: Upgrade LLVM
        run: choco upgrade llvm -y

      - name: Build
        env:
          SCCACHE_GHA_ENABLED: true
          RUSTC_WRAPPER: sccache
        run: cargo build --features embed-useragent-stylesheets --release

      - name: Make archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path eesha-release
          Copy-Item target\release\eesha.exe eesha-release\
          Copy-Item -Recurse -Force resources eesha-release\resources
          Copy-Item -Recurse -Force icons eesha-release\icons
          Get-ChildItem -Path "target\release\build" -Recurse -Filter "libEGL.dll" | ForEach-Object { Copy-Item $_.FullName eesha-release\ }
          Get-ChildItem -Path "target\release\build" -Recurse -Filter "libGLESv2.dll" | ForEach-Object { Copy-Item $_.FullName eesha-release\ }
          cd eesha-release
          tar -czvf ..\eesha-x86_64-pc-windows-msvc.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eesha-x86_64-pc-windows-msvc
          path: ./eesha-x86_64-pc-windows-msvc.tar.gz

  build-macos:
    name: macOS (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            display: ARM
          - target: x86_64-apple-darwin
            display: Intel
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dsherret/rust-toolchain-file@v1

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.8

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install mako
        run: python -m pip install mako

      - name: Install dependencies
        run: brew install cmake gstreamer gst-plugins-base gst-plugins-good gst-plugins-bad gst-libav

      - name: Add rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        env:
          SCCACHE_GHA_ENABLED: true
          RUSTC_WRAPPER: sccache
        run: |
          export PATH="/Library/Frameworks/GStreamer.framework/Versions/1.0/bin:$PATH"
          export DYLD_LIBRARY_PATH="/Library/Frameworks/GStreamer.framework/Versions/1.0/lib"
          cargo build --target ${{ matrix.target }} --features embed-useragent-stylesheets --release

      - name: Make archive
        run: |
          mkdir -p eesha-release
          cp target/${{ matrix.target }}/release/eesha eesha-release/
          cp -r resources eesha-release/
          cp -r icons eesha-release/
          cd eesha-release && tar -czvf ../eesha-${{ matrix.target }}.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eesha-${{ matrix.target }}
          path: ./eesha-${{ matrix.target }}.tar.gz

  build-android:
    name: Android (${{ matrix.abi }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-linux-android
          - armv7-linux-androideabi
          - x86_64-linux-android
        include:
          - target: aarch64-linux-android
            abi: arm64-v8a
          - target: armv7-linux-androideabi
            abi: armeabi-v7a
          - target: x86_64-linux-android
            abi: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dsherret/rust-toolchain-file@v1

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.8

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r28b

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt install build-essential python3-pip clang cmake curl \
            g++ git gperf libdbus-1-dev libfreetype6-dev libgl1-mesa-dri \
            libgles2-mesa-dev libglib2.0-dev libharfbuzz-dev liblzma-dev \
            libssl-dev libunwind-dev libvulkan1 libx11-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxmu-dev libxmu6 libegl1-mesa-dev llvm-dev m4 xorg-dev \
            python3-mako

      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=/usr/lib/llvm-14/lib" >> $GITHUB_ENV

      - name: Build native library
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
          SCCACHE_GHA_ENABLED: true
          RUSTC_WRAPPER: sccache
          OPENSSL_NO_VENDOR: "0"
        run: |
          # Determine the correct NDK tool prefix
          # NDK bin names: aarch64-linux-android24-clang, armv7-linux-androideabi24-clang, x86_64-linux-android24-clang
          if [ "${{ matrix.target }}" = "armv7-linux-androideabi" ]; then
            TOOL_PREFIX="armv7-linux-androideabi"
          else
            TOOL_PREFIX="${{ matrix.target }}"
          fi

          # Set up NDK toolchain for cargo
          mkdir -p .cargo
          echo "[target.${{ matrix.target }}]" >> .cargo/config.toml
          echo "linker = \"${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin/${TOOL_PREFIX}24-clang\"" >> .cargo/config.toml
          echo "ar = \"${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar\"" >> .cargo/config.toml

          # Set CC/CXX for C/C++ dependencies (needed for vendored OpenSSL build)
          export CC="${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin/${TOOL_PREFIX}24-clang"
          export CXX="${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin/${TOOL_PREFIX}24-clang++"
          export AR="${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          export RANLIB="${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ranlib"

          # Set Android API level for OpenSSL vendored build
          export ANDROID_API=24

          # Set sysroot and include paths for bindgen (needed by aws-lc-sys / rustls)
          NDK_SYSROOT="${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          export CFLAGS="-U__ANDROID_API__ -D__ANDROID_API__=24 --sysroot=${NDK_SYSROOT}"
          export CXXFLAGS="-U__ANDROID_API__ -D__ANDROID_API__=24 --sysroot=${NDK_SYSROOT}"
          export BINDGEN_EXTRA_CLANG_ARGS="--sysroot=${NDK_SYSROOT} -I${NDK_SYSROOT}/usr/include -I${NDK_SYSROOT}/usr/include/${TOOL_PREFIX}"
          # Set target-specific CC/CXX env vars for cargo
          export CC_${{ matrix.target }}="${CC}"
          export CXX_${{ matrix.target }}="${CXX}"
          export AR_${{ matrix.target }}="${AR}"

          # jemalloc's configure script fails with Android NDK for some targets
          # Create a jemalloc stub library similar to the iOS approach
          mkdir -p /tmp/jemalloc-stub
          printf 'void je_mallocx() {}\nvoid je_dallocx() {}\nvoid je_nallocx() {}\nvoid je_rallocx() {}\nvoid je_sallocx() {}\nvoid je_mallctl() {}\nvoid je_mallctlnametomib() {}\nvoid je_mallctlbymib() {}\nvoid je_malloc_stats_print() {}\nvoid je_malloc_usable_size() {}\n' > /tmp/jemalloc-stub/jemalloc.c
          ${CC} -c -o /tmp/jemalloc-stub/jemalloc.o /tmp/jemalloc-stub/jemalloc.c
          ${AR} rcs /tmp/jemalloc-stub/libjemalloc.a /tmp/jemalloc-stub/jemalloc.o
          export JEMALLOC_OVERRIDE=/tmp/jemalloc-stub/libjemalloc.a

          # Build the Rust library for Android
          # Use --no-default-features to disable bluetooth and background_hang_monitor
          # openssl-sys with vendored feature will build OpenSSL from source using the NDK
          cargo build --target ${{ matrix.target }} --features embed-useragent-stylesheets --release --lib --no-default-features

      - name: Prepare APK native libs
        run: |
          mkdir -p support/android/apk/servoapp/src/main/jniLibs/${{ matrix.abi }}
          cp target/${{ matrix.target }}/release/libeesha.so support/android/apk/servoapp/src/main/jniLibs/${{ matrix.abi }}/

      - name: Build APK
        working-directory: support/android/apk
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease -Pandroid.nativeLibsDirectory=src/main/jniLibs

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: eesha-${{ matrix.abi }}-android
          path: support/android/apk/servoapp/build/outputs/apk/release/*.apk

      - name: Make archive
        run: |
          cp target/${{ matrix.target }}/release/libeesha.so .
          tar -czvf eesha-${{ matrix.target }}.tar.gz libeesha.so

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: eesha-${{ matrix.target }}-lib
          path: eesha-${{ matrix.target }}.tar.gz

  build-ios:
    name: iOS (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-ios
          - aarch64-apple-ios-sim
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dsherret/rust-toolchain-file@v1

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.8

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install mako
        run: python -m pip install mako

      - name: Install dependencies
        run: brew install cmake

      - name: Build
        env:
          SCCACHE_GHA_ENABLED: true
          RUSTC_WRAPPER: sccache
        run: |
          # Determine the correct clang target and SDK for iOS
          if [ "${{ matrix.target }}" = "aarch64-apple-ios-sim" ]; then
            CLANG_TARGET="arm64-apple-ios14.0-simulator"
            SDK=$(xcrun --sdk iphonesimulator --show-sdk-path)
          else
            CLANG_TARGET="arm64-apple-ios14.0"
            SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          fi

          # jemalloc doesn't support iOS - provide a stub via JEMALLOC_OVERRIDE
          mkdir -p /tmp/jemalloc-stub
          printf 'void je_mallocx() {}\nvoid je_dallocx() {}\nvoid je_nallocx() {}\nvoid je_rallocx() {}\nvoid je_sallocx() {}\nvoid je_mallctl() {}\nvoid je_mallctlnametomib() {}\nvoid je_mallctlbymib() {}\nvoid je_malloc_stats_print() {}\nvoid je_malloc_usable_size() {}\n' > /tmp/jemalloc-stub/jemalloc.c
          clang -c -target "$CLANG_TARGET" -isysroot "$SDK" -o /tmp/jemalloc-stub/jemalloc.o /tmp/jemalloc-stub/jemalloc.c
          ar rcs /tmp/jemalloc-stub/libjemalloc.a /tmp/jemalloc-stub/jemalloc.o
          export JEMALLOC_OVERRIDE=/tmp/jemalloc-stub/libjemalloc.a

          # X11 doesn't exist on iOS - create stub libraries for the x11 crate
          mkdir -p /tmp/x11-stub
          printf 'void XOpenDisplay() {}\nvoid XCloseDisplay() {}\nvoid XCreateWindow() {}\nvoid XDestroyWindow() {}\nvoid XMapWindow() {}\nvoid XUnmapWindow() {}\nvoid XFlush() {}\nvoid XSync() {}\nvoid XGetGeometry() {}\nvoid XCreateGC() {}\nvoid XFreeGC() {}\nvoid XDrawRectangle() {}\nvoid XFillRectangle() {}\nvoid XDrawLine() {}\nvoid XDrawString() {}\nvoid XSetForeground() {}\nvoid XSetBackground() {}\nvoid XSelectInput() {}\nvoid XNextEvent() {}\nvoid XSendEvent() {}\nvoid XPending() {}\nvoid XLookupKeysym() {}\nvoid XCreatePixmap() {}\nvoid XFreePixmap() {}\nvoid XCreateColormap() {}\nvoid XFreeColormap() {}\nvoid XInternAtom() {}\nvoid XSetWMProtocols() {}\nvoid XGetWMNormalHints() {}\nvoid XSetWMNormalHints() {}\nvoid XChangeProperty() {}\nvoid XGrabServer() {}\nvoid XUngrabServer() {}\nvoid XGetInputFocus() {}\nvoid XSetInputFocus() {}\nvoid XWarpPointer() {}\nvoid XQueryTree() {}\nvoid XTranslateCoordinates() {}\nvoid XGetWindowAttributes() {}\nvoid XChangeWindowAttributes() {}\nvoid XConfigureWindow() {}\nvoid XMoveResizeWindow() {}\nvoid XResizeWindow() {}\nvoid XMoveWindow() {}\nvoid XRaiseWindow() {}\nvoid XLowerWindow() {}\nvoid XRestackWindows() {}\nvoid XIconifyWindow() {}\nvoid XReparentWindow() {}\nvoid XkbGetMap() {}\nvoid XkbFreeKeyboard() {}\nvoid XrmInitialize() {}\nvoid XOpenIM() {}\nvoid XCloseIM() {}\nvoid XCreateIC() {}\nvoid XDestroyIC() {}\nvoid XSetICFocus() {}\nvoid XUnsetICFocus() {}\nvoid XFilterEvent() {}\nvoid XmbLookupString() {}\nvoid Xutf8LookupString() {}\nvoid XConvertSelection() {}\nvoid XSetSelectionOwner() {}\nvoid XGetSelectionOwner() {}\nvoid XScreenOfDisplay() {}\nvoid XDefaultScreen() {}\nvoid XDefaultRootWindow() {}\nvoid XDefaultVisual() {}\nvoid XDefaultDepth() {}\nvoid XDefaultScreenOfDisplay() {}\nvoid XDisplayWidth() {}\nvoid XDisplayHeight() {}\nvoid XConnectionNumber() {}\nvoid XInitExtension() {}\nvoid XShmQueryVersion() {}\nvoid XShmCreateImage() {}\nvoid XShmDetach() {}\nvoid XShmAttach() {}\nvoid XRenderQueryVersion() {}\nvoid XRenderFindVisualFormat() {}\nvoid XRenderCreatePicture() {}\nvoid XRenderFreePicture() {}\nvoid XRenderFillRectangle() {}\nvoid XRenderComposite() {}\nvoid XRenderSetPictureClipRectangles() {}\n' > /tmp/x11-stub/x11.c
          clang -c -target "$CLANG_TARGET" -isysroot "$SDK" -o /tmp/x11-stub/x11.o /tmp/x11-stub/x11.c
          ar rcs /tmp/x11-stub/libX11.a /tmp/x11-stub/x11.o

          # Create Xext stub
          printf 'void XShmGetImage() {}\nvoid XShmPutImage() {}\nvoid XShmCreatePixmap() {}\nvoid XMITMiscGetBugMode() {}\nvoid XMITMiscSetBugMode() {}\n' > /tmp/x11-stub/xext.c
          clang -c -target "$CLANG_TARGET" -isysroot "$SDK" -o /tmp/x11-stub/xext.o /tmp/x11-stub/xext.c
          ar rcs /tmp/x11-stub/libXext.a /tmp/x11-stub/xext.o

          # Create Xcursor stub
          printf 'void XcursorLibraryLoadCursor() {}\nvoid XcursorShapeLoadCursor() {}\nvoid XcursorImageCreate() {}\nvoid XcursorImageDestroy() {}\nvoid XcursorImageLoadCursor() {}\n' > /tmp/x11-stub/xcursor.c
          clang -c -target "$CLANG_TARGET" -isysroot "$SDK" -o /tmp/x11-stub/xcursor.o /tmp/x11-stub/xcursor.c
          ar rcs /tmp/x11-stub/libXcursor.a /tmp/x11-stub/xcursor.o

          # Create Xi stub
          printf 'void XISelectEvents() {}\nvoid XIQueryDevice() {}\nvoid XIFreeDeviceInfo() {}\nvoid XIQueryVersion() {}\n' > /tmp/x11-stub/xi.c
          clang -c -target "$CLANG_TARGET" -isysroot "$SDK" -o /tmp/x11-stub/xi.o /tmp/x11-stub/xi.c
          ar rcs /tmp/x11-stub/libXi.a /tmp/x11-stub/xi.o

          # Create Xrender stub
          printf 'void XRenderQueryExtension() {}\nvoid XRenderQueryFormats() {}\n' > /tmp/x11-stub/xrender.c
          clang -c -target "$CLANG_TARGET" -isysroot "$SDK" -o /tmp/x11-stub/xrender.o /tmp/x11-stub/xrender.c
          ar rcs /tmp/x11-stub/libXrender.a /tmp/x11-stub/xrender.o

          # Create Xrandr stub
          printf 'void XRRGetScreenInfo() {}\nvoid XRRConfigCurrentConfiguration() {}\nvoid XRRConfigCurrentRate() {}\nvoid XRRConfigRates() {}\nvoid XRRConfigSizes() {}\nvoid XRRFreeConfigInfo() {}\nvoid XRRQueryExtension() {}\nvoid XRRQueryVersion() {}\nvoid XRRGetScreenSizeRange() {}\nvoid XRRSetScreenSize() {}\nvoid XRRGetScreenResources() {}\nvoid XRRFreeScreenResources() {}\nvoid XRRGetOutputInfo() {}\nvoid XRRFreeOutputInfo() {}\nvoid XRRGetCrtcInfo() {}\nvoid XRRFreeCrtcInfo() {}\nvoid XRRSetCrtcConfig() {}\n' > /tmp/x11-stub/xrandr.c
          clang -c -target "$CLANG_TARGET" -isysroot "$SDK" -o /tmp/x11-stub/xrandr.o /tmp/x11-stub/xrandr.c
          ar rcs /tmp/x11-stub/libXrandr.a /tmp/x11-stub/xrandr.o

          # Create GLX stub
          printf 'void glXCreateContext() {}\nvoid glXDestroyContext() {}\nvoid glXMakeCurrent() {}\nvoid glXSwapBuffers() {}\nvoid glXChooseVisual() {}\nvoid glXQueryExtension() {}\nvoid glXQueryVersion() {}\nvoid glXGetConfig() {}\nvoid glXGetCurrentContext() {}\nvoid glXGetCurrentDrawable() {}\nvoid glXCreateNewContext() {}\nvoid glXCreateWindow() {}\nvoid glXDestroyWindow() {}\nvoid glXGetVisualFromFBConfig() {}\nvoid glXChooseFBConfig() {}\nvoid glXGetFBConfigAttrib() {}\nvoid glXQueryExtensionsString() {}\n' > /tmp/x11-stub/glx.c
          clang -c -target "$CLANG_TARGET" -isysroot "$SDK" -o /tmp/x11-stub/glx.o /tmp/x11-stub/glx.c
          ar rcs /tmp/x11-stub/libGL.a /tmp/x11-stub/glx.o

          # Create pkg-config directory for x11 stubs
          mkdir -p /tmp/x11-stub/pkgconfig
          cat > /tmp/x11-stub/pkgconfig/x11.pc << 'PCEOF'
          prefix=/tmp/x11-stub
          exec_prefix=${prefix}
          libdir=${exec_prefix}
          includedir=${prefix}/include
          Name: X11
          Description: X11 stub for iOS
          Version: 1.0
          Libs: -L${libdir} -lX11
          Cflags: -I${includedir}
          PCEOF
          cat > /tmp/x11-stub/pkgconfig/xext.pc << 'PCEOF'
          prefix=/tmp/x11-stub
          exec_prefix=${prefix}
          libdir=${exec_prefix}
          includedir=${prefix}/include
          Name: Xext
          Description: Xext stub for iOS
          Version: 1.0
          Libs: -L${libdir} -lXext
          Cflags: -I${includedir}
          PCEOF
          cat > /tmp/x11-stub/pkgconfig/xcursor.pc << 'PCEOF'
          prefix=/tmp/x11-stub
          exec_prefix=${prefix}
          libdir=${exec_prefix}
          includedir=${prefix}/include
          Name: Xcursor
          Description: Xcursor stub for iOS
          Version: 1.0
          Libs: -L${libdir} -lXcursor
          Cflags: -I${includedir}
          PCEOF
          cat > /tmp/x11-stub/pkgconfig/xi.pc << 'PCEOF'
          prefix=/tmp/x11-stub
          exec_prefix=${prefix}
          libdir=${exec_prefix}
          includedir=${prefix}/include
          Name: Xi
          Description: Xi stub for iOS
          Version: 1.0
          Libs: -L${libdir} -lXi
          Cflags: -I${includedir}
          PCEOF
          cat > /tmp/x11-stub/pkgconfig/xrender.pc << 'PCEOF'
          prefix=/tmp/x11-stub
          exec_prefix=${prefix}
          libdir=${exec_prefix}
          includedir=${prefix}/include
          Name: Xrender
          Description: Xrender stub for iOS
          Version: 1.0
          Libs: -L${libdir} -lXrender
          Cflags: -I${includedir}
          PCEOF
          cat > /tmp/x11-stub/pkgconfig/xrandr.pc << 'PCEOF'
          prefix=/tmp/x11-stub
          exec_prefix=${prefix}
          libdir=${exec_prefix}
          includedir=${prefix}/include
          Name: Xrandr
          Description: Xrandr stub for iOS
          Version: 1.0
          Libs: -L${libdir} -lXrandr
          Cflags: -I${includedir}
          PCEOF

          # Create a custom pkg-config wrapper that returns our stub values
          # This is needed because the system pkg-config on macOS doesn't support iOS cross-compilation
          mkdir -p /tmp/x11-stub/bin
          echo '#!/bin/bash' > /tmp/x11-stub/bin/pkg-config
          echo 'case "$1" in' >> /tmp/x11-stub/bin/pkg-config
          echo '  --libs)' >> /tmp/x11-stub/bin/pkg-config
          echo '    case "$2" in' >> /tmp/x11-stub/bin/pkg-config
          echo '      x11) echo "-L/tmp/x11-stub -lX11" ;;' >> /tmp/x11-stub/bin/pkg-config
          echo '      xext) echo "-L/tmp/x11-stub -lXext" ;;' >> /tmp/x11-stub/bin/pkg-config
          echo '      xcursor) echo "-L/tmp/x11-stub -lXcursor" ;;' >> /tmp/x11-stub/bin/pkg-config
          echo '      xi) echo "-L/tmp/x11-stub -lXi" ;;' >> /tmp/x11-stub/bin/pkg-config
          echo '      xrender) echo "-L/tmp/x11-stub -lXrender" ;;' >> /tmp/x11-stub/bin/pkg-config
          echo '      xrandr) echo "-L/tmp/x11-stub -lXrandr" ;;' >> /tmp/x11-stub/bin/pkg-config
          echo '      gl) echo "-L/tmp/x11-stub -lGL" ;;' >> /tmp/x11-stub/bin/pkg-config
          echo '      *) echo "-L/tmp/x11-stub" ;;' >> /tmp/x11-stub/bin/pkg-config
          echo '    esac ;;' >> /tmp/x11-stub/bin/pkg-config
          echo '  --cflags)' >> /tmp/x11-stub/bin/pkg-config
          echo '    echo "-I/tmp/x11-stub/include" ;;' >> /tmp/x11-stub/bin/pkg-config
          echo '  --exists)' >> /tmp/x11-stub/bin/pkg-config
          echo '    exit 0 ;;' >> /tmp/x11-stub/bin/pkg-config
          echo '  --modversion)' >> /tmp/x11-stub/bin/pkg-config
          echo '    echo "1.0" ;;' >> /tmp/x11-stub/bin/pkg-config
          echo '  --libs-only-l)' >> /tmp/x11-stub/bin/pkg-config
          echo '    case "$2" in' >> /tmp/x11-stub/bin/pkg-config
          echo '      x11) echo "-lX11" ;;' >> /tmp/x11-stub/bin/pkg-config
          echo '      xext) echo "-lXext" ;;' >> /tmp/x11-stub/bin/pkg-config
          echo '      xcursor) echo "-lXcursor" ;;' >> /tmp/x11-stub/bin/pkg-config
          echo '      xi) echo "-lXi" ;;' >> /tmp/x11-stub/bin/pkg-config
          echo '      xrender) echo "-lXrender" ;;' >> /tmp/x11-stub/bin/pkg-config
          echo '      xrandr) echo "-lXrandr" ;;' >> /tmp/x11-stub/bin/pkg-config
          echo '      gl) echo "-lGL" ;;' >> /tmp/x11-stub/bin/pkg-config
          echo '      *) echo "" ;;' >> /tmp/x11-stub/bin/pkg-config
          echo '    esac ;;' >> /tmp/x11-stub/bin/pkg-config
          echo '  --libs-only-L)' >> /tmp/x11-stub/bin/pkg-config
          echo '    echo "-L/tmp/x11-stub" ;;' >> /tmp/x11-stub/bin/pkg-config
          echo '  *)' >> /tmp/x11-stub/bin/pkg-config
          echo '    /usr/bin/pkg-config "$@" 2>/dev/null || true ;;' >> /tmp/x11-stub/bin/pkg-config
          echo 'esac' >> /tmp/x11-stub/bin/pkg-config
          chmod +x /tmp/x11-stub/bin/pkg-config
          export PKG_CONFIG=/tmp/x11-stub/bin/pkg-config

          # Create X11 include headers for the Rust x11 crate
          mkdir -p /tmp/x11-stub/include/X11
          printf '#ifndef X11_STUB_H\n#define X11_STUB_H\ntypedef void* Display;\ntypedef unsigned long Window;\ntypedef unsigned long Drawable;\ntypedef unsigned long Pixmap;\ntypedef unsigned long Colormap;\ntypedef unsigned long Cursor;\ntypedef unsigned long VisualID;\ntypedef void* Visual;\ntypedef void* Screen;\ntypedef void* GC;\ntypedef int Bool;\ntypedef int Status;\ntypedef void* XImage;\ntypedef void* XSetWindowAttributes;\ntypedef void* XWindowAttributes;\ntypedef void* XEvent;\ntypedef void* Atom;\ntypedef void* XVisualInfo;\ntypedef void* XSizeHints;\ntypedef void* XWMHints;\ntypedef void* XTextProperty;\ntypedef void* XClassHint;\ntypedef void* XWMHints;\ntypedef int XKeyEvent;\ntypedef int XButtonEvent;\ntypedef int XMotionEvent;\ntypedef int XCrossingEvent;\ntypedef int XConfigureEvent;\ntypedef int XClientMessageEvent;\ntypedef int XSelectionEvent;\ntypedef int XPropertyEvent;\ntypedef int XDestroyWindowEvent;\ntypedef int XMapEvent;\ntypedef int XUnmapEvent;\ntypedef int XFocusChangeEvent;\ntypedef int XExposeEvent;\ntypedef int XVisibilityEvent;\ntypedef int XGravityEvent;\ntypedef int XReparentEvent;\ntypedef int XConfigureRequestEvent;\ntypedef int XMapRequestEvent;\ntypedef int XResizeRequestEvent;\ntypedef int XCirculateEvent;\ntypedef int XCirculateRequestEvent;\ntypedef int XColormapEvent;\ntypedef int XMappingEvent;\ntypedef int XSelectionClearEvent;\ntypedef int XSelectionRequestEvent;\ntypedef int XNoExposeEvent;\ntypedef unsigned long KeySym;\ntypedef unsigned long KeyCode;\n#define None 0L\n#define CopyFromParent 0L\n#define InputOutput 1\n#define InputOnly 2\n#define CWBackPixel (1L<<1)\n#define CWEventMask (1L<<11)\n#define StructureNotifyMask (1L<<16)\n#define SubstructureRedirectMask (1L<<20)\n#define SubstructureNotifyMask (1L<<19)\n#define ButtonPressMask (1L<<2)\n#define ButtonReleaseMask (1L<<3)\n#define PointerMotionMask (1L<<6)\n#define KeyPressMask (1L<<0)\n#define KeyReleaseMask (1L<<1)\n#define ExposureMask (1L<<15)\n#define FocusChangeMask (1L<<21)\n#define EnterWindowMask (1L<<4)\n#define LeaveWindowMask (1L<<5)\n#define PropertyChangeMask (1L<<22)\n#define VisibilityChangeMask (1L<<16)\n#endif\n' > /tmp/x11-stub/include/X11/Xlib.h

          export C_INCLUDE_PATH=/tmp/x11-stub/include
          export CFLAGS="-I/tmp/x11-stub/include"

          export CARGO_TARGET_AARCH64_APPLE_IOS_RUSTFLAGS="-C link-arg=-framework -C link-arg=Foundation -L /tmp/x11-stub"
          export CARGO_TARGET_AARCH64_APPLE_IOS_SIM_RUSTFLAGS="-C link-arg=-framework -C link-arg=Foundation -L /tmp/x11-stub"

          cargo build --target ${{ matrix.target }} --features embed-useragent-stylesheets --release --no-default-features

      - name: Make archive
        working-directory: ./target/${{ matrix.target }}/release
        run: |
          # Create archive of the static library
          if [ -f libeesha.a ]; then
            tar -czvf eesha-${{ matrix.target }}.tar.gz libeesha.a
          else
            echo "Warning: libeesha.a not found, creating empty archive"
            touch eesha-${{ matrix.target }}.tar.gz
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eesha-${{ matrix.target }}
          path: ./target/${{ matrix.target }}/release/eesha-${{ matrix.target }}.tar.gz

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
      - build-macos
      - build-android
      - build-ios
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dsherret/rust-toolchain-file@v1

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts/

      - name: Publish release
        run: |
          RELEASE_TAG=eesha-v$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.name == "eesha") | .version')
          git fetch --tags --quiet
          if ! git show-ref --tags --verify --quiet "refs/tags/${RELEASE_TAG}" ; then
            gh release create ${RELEASE_TAG} ./artifacts/*.tar.gz ./artifacts/*.apk --prerelease --title "Eesha $(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.name == "eesha") | .version')" --notes "Eesha browser build for all platforms

          ## Platforms
          - **Linux** (x86_64) - tar.gz archive
          - **Windows** (x86_64) - tar.gz archive with ANGLE DLLs
          - **macOS** (ARM/Apple Silicon & Intel) - tar.gz archives
          - **Android** (arm64-v8a, armeabi-v7a, x86_64) - APK files
          - **iOS** (arm64 device & simulator) - static library archives"
          fi
