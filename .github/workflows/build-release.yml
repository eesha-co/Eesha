# Build Eesha for all platforms
name: Release Eesha

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dsherret/rust-toolchain-file@v1

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.8

      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=/usr/lib/llvm-14/lib" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt install build-essential python3-pip ccache clang cmake curl \
            g++ git gperf libdbus-1-dev libfreetype6-dev libgl1-mesa-dri \
            libgles2-mesa-dev libglib2.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good libgstreamer-plugins-good1.0-dev \
            gstreamer1.0-plugins-bad libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-plugins-ugly gstreamer1.0-plugins-base \
            libgstreamer-plugins-base1.0-dev gstreamer1.0-libav \
            libgstrtspserver-1.0-dev gstreamer1.0-tools libges-1.0-dev \
            libharfbuzz-dev liblzma-dev libunwind-dev libvulkan1 \
            libx11-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxmu-dev libxmu6 libegl1-mesa-dev llvm-dev m4 xorg-dev sway \
            python3-mako

      - name: Build
        env:
          SCCACHE_GHA_ENABLED: true
          RUSTC_WRAPPER: sccache
        run: cargo build --features embed-useragent-stylesheets --release

      - name: Make archive
        run: |
          mkdir -p eesha-release
          cp target/release/eesha eesha-release/
          cp -r resources eesha-release/
          cp -r icons eesha-release/
          cd eesha-release && tar -czvf ../eesha-x86_64-unknown-linux-gnu.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eesha-x86_64-unknown-linux-gnu
          path: ./eesha-x86_64-unknown-linux-gnu.tar.gz

  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dsherret/rust-toolchain-file@v1

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.8

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install mako
        run: python -m pip install mako

      - name: Install scoop
        uses: MinoruSekine/setup-scoop@v4

      - name: Install dependencies
        run: |
          scoop install cmake

      - name: Upgrade LLVM
        run: choco upgrade llvm -y

      - name: Build
        env:
          SCCACHE_GHA_ENABLED: true
          RUSTC_WRAPPER: sccache
        run: cargo build --features embed-useragent-stylesheets --release

      - name: Make archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path eesha-release
          Copy-Item target\release\eesha.exe eesha-release\
          Copy-Item -Recurse -Force resources eesha-release\resources
          Copy-Item -Recurse -Force icons eesha-release\icons
          Get-ChildItem -Path "target\release\build" -Recurse -Filter "libEGL.dll" | ForEach-Object { Copy-Item $_.FullName eesha-release\ }
          Get-ChildItem -Path "target\release\build" -Recurse -Filter "libGLESv2.dll" | ForEach-Object { Copy-Item $_.FullName eesha-release\ }
          cd eesha-release
          tar -czvf ..\eesha-x86_64-pc-windows-msvc.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eesha-x86_64-pc-windows-msvc
          path: ./eesha-x86_64-pc-windows-msvc.tar.gz

  build-macos:
    name: macOS (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            display: ARM
          - target: x86_64-apple-darwin
            display: Intel
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dsherret/rust-toolchain-file@v1

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.8

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install mako
        run: python -m pip install mako

      - name: Install dependencies
        run: brew install cmake gstreamer gst-plugins-base gst-plugins-good gst-plugins-bad gst-libav

      - name: Add rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        env:
          SCCACHE_GHA_ENABLED: true
          RUSTC_WRAPPER: sccache
        run: |
          export PATH="/Library/Frameworks/GStreamer.framework/Versions/1.0/bin:$PATH"
          export DYLD_LIBRARY_PATH="/Library/Frameworks/GStreamer.framework/Versions/1.0/lib"
          cargo build --target ${{ matrix.target }} --features embed-useragent-stylesheets --release

      - name: Make archive
        run: |
          mkdir -p eesha-release
          cp target/${{ matrix.target }}/release/eesha eesha-release/
          cp -r resources eesha-release/
          cp -r icons eesha-release/
          cd eesha-release && tar -czvf ../eesha-${{ matrix.target }}.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eesha-${{ matrix.target }}
          path: ./eesha-${{ matrix.target }}.tar.gz

  build-android:
    name: Android (${{ matrix.abi }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-linux-android
          - armv7-linux-androideabi
          - x86_64-linux-android
        include:
          - target: aarch64-linux-android
            abi: arm64-v8a
            ndk_llvm_target: aarch64-linux-android
          - target: armv7-linux-androideabi
            abi: armeabi-v7a
            ndk_llvm_target: armv7-linux-androideabi
          - target: x86_64-linux-android
            abi: x86_64
            ndk_llvm_target: x86_64-linux-android
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dsherret/rust-toolchain-file@v1

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.8

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26c

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt install build-essential python3-pip clang cmake curl \
            g++ git gperf libdbus-1-dev libfreetype6-dev libgl1-mesa-dri \
            libgles2-mesa-dev libglib2.0-dev libharfbuzz-dev liblzma-dev \
            libssl-dev libunwind-dev libvulkan1 libx11-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxmu-dev libxmu6 libegl1-mesa-dev llvm-dev m4 xorg-dev \
            python3-mako

      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=/usr/lib/llvm-14/lib" >> $GITHUB_ENV

      - name: Build native library
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
          SCCACHE_GHA_ENABLED: true
          RUSTC_WRAPPER: sccache
          OPENSSL_NO_VENDOR: "0"
          OPENSSL_NO_ASM: "1"
          # Set Android cmake vars as env vars - NDK cmake toolchain reads these
          ANDROID_ABI: ${{ matrix.abi }}
          ANDROID_PLATFORM: android-21
          # mozjs_sys reads ANDROID_API_LEVEL for --with-android-version in makefile.cargo
          ANDROID_API_LEVEL: "21"
        run: |
          NDK_BIN="${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          NDK_SYSROOT="${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          ANDROID_API=21
          export ANDROID_API_LEVEL=21
          NDK_LLVM_TARGET="${{ matrix.ndk_llvm_target }}"

          # Find the clang binary for this target.
          # Strategy: 1) Try target-specific binary with API level, 
          # 2) Try any target-specific binary, 3) Fall back to generic clang
          CLANG_BIN=$(ls ${NDK_BIN}/${NDK_LLVM_TARGET}${ANDROID_API}-clang 2>/dev/null || true)
          if [ -z "${CLANG_BIN}" ]; then
            CLANG_BIN=$(ls ${NDK_BIN}/${NDK_LLVM_TARGET}*-clang 2>/dev/null | head -1 || true)
          fi
          if [ -z "${CLANG_BIN}" ]; then
            echo "No target-specific clang found for ${NDK_LLVM_TARGET}, using generic clang"
            CLANG_BIN="${NDK_BIN}/clang"
          fi
          echo "Using clang: ${CLANG_BIN}"
          ${CLANG_BIN} --version | head -1
          CLANGXX_BIN="${CLANG_BIN%clang}clang++"
          if [ ! -f "${CLANGXX_BIN}" ]; then
            CLANGXX_BIN="${NDK_BIN}/clang++"
          fi

          # ALWAYS add --target flag to ensure correct cross-compilation target.
          # The cc crate may add --target=<host> which is wrong for cross-compilation.
          # Adding it at the end of CFLAGS ensures it takes precedence (Clang uses the last --target).
          CLANG_TARGET_FLAG="--target=${NDK_LLVM_TARGET}${ANDROID_API}"

          # Set up cargo linker config
          mkdir -p .cargo
          echo "[target.${{ matrix.target }}]" >> .cargo/config.toml
          echo "linker = \"${CLANG_BIN}\"" >> .cargo/config.toml
          echo "ar = \"${NDK_BIN}/llvm-ar\"" >> .cargo/config.toml

          # CRITICAL: Only use TARGET-SPECIFIC env vars for CC/CXX/AR.
          # Do NOT set global CC/CXX as this breaks HOST C compilation
          CARGO_TARGET=$(echo "${{ matrix.target }}" | tr '-' '_')
          export "CC_${CARGO_TARGET}"="${CLANG_BIN}"
          export "CXX_${CARGO_TARGET}"="${CLANGXX_BIN}"
          export "AR_${CARGO_TARGET}"="${NDK_BIN}/llvm-ar"
          export "RANLIB_${CARGO_TARGET}"="${NDK_BIN}/llvm-ranlib"

          # Set target-specific CFLAGS/CXXFLAGS with --target flag LAST so it overrides
          # any incorrect --target=<host> that the cc crate might add.
          export "CFLAGS_${CARGO_TARGET}"="-U__ANDROID_API__ -D__ANDROID_API__=${ANDROID_API} --sysroot=${NDK_SYSROOT} ${CLANG_TARGET_FLAG}"
          export "CXXFLAGS_${CARGO_TARGET}"="-U__ANDROID_API__ -D__ANDROID_API__=${ANDROID_API} --sysroot=${NDK_SYSROOT} ${CLANG_TARGET_FLAG}"
          export BINDGEN_EXTRA_CLANG_ARGS="--sysroot=${NDK_SYSROOT} -I${NDK_SYSROOT}/usr/include -I${NDK_SYSROOT}/usr/include/${NDK_LLVM_TARGET} -U__ANDROID_API__ -D__ANDROID_API__=${ANDROID_API}"

          # Create a custom cmake toolchain wrapper that forces ANDROID_ABI and ANDROID_PLATFORM
          # The NDK cmake toolchain may not correctly read ANDROID_ABI from environment.
          mkdir -p /tmp/cmake-toolchain
          cat > /tmp/cmake-toolchain/android-toolchain.cmake << 'TCEOF'
          set(ANDROID_ABI "$ENV{ANDROID_ABI}")
          set(ANDROID_PLATFORM "$ENV{ANDROID_PLATFORM}")
          if(NOT ANDROID_PLATFORM)
            set(ANDROID_PLATFORM "android-21")
          endif()
          include("$ENV{ANDROID_NDK_ROOT}/build/cmake/android.toolchain.cmake")
          TCEOF
          export CMAKE_TOOLCHAIN_FILE="/tmp/cmake-toolchain/android-toolchain.cmake"
          export "CMAKE_TOOLCHAIN_FILE_${CARGO_TARGET}"="/tmp/cmake-toolchain/android-toolchain.cmake"

          # Create stub libraries for pkg-config-dependent crates
          mkdir -p /tmp/android-stubs
          echo 'void FcInit() {} void FcFini() {} void FcGetVersion() {} void FcConfigGetCurrent() {} void FcConfigAppFontAddFile() {} void FcConfigAppFontAddDir() {} void FcConfigSubstitute() {} void FcDefaultSubstitute() {} void FcFontMatch() {} void FcFontSort() {} void FcPatternCreate() {} void FcPatternDestroy() {} void FcPatternAddString() {} void FcPatternAddInteger() {} void FcPatternAddDouble() {} void FcPatternAddBool() {} void FcPatternGetString() {} void FcPatternGetInteger() {} void FcPatternGetDouble() {} void FcPatternGetBool() {} void FcFontSetCreate() {} void FcFontSetDestroy() {} void FcFontSetAdd() {} void FcObjectSetCreate() {} void FcObjectSetAdd() {} void FcObjectSetDestroy() {} void FcFontList() {} void FcNameParse() {} void FcNameUnparse() {} void FcStrFree() {} void FcStrSetCreate() {} void FcStrSetDestroy() {} void FcStrSetAdd() {} void FcStrSetAddFilename() {} void FcStrListCreate() {} void FcStrListNext() {} void FcStrListDone() {} void FcConfigParseAndLoad() {} void FcConfigBuildFonts() {} void FcInitReinitialize() {} void FcInitBringUptoDate() {} void FcGetResult() {} void FcPatternFormat() {} void FcPatternDuplicate() {} void FcPatternFilter() {} void FcPatternReference() {} void FcValueDestroy() {} void FcValueSave() {} void FcCharSetCreate() {} void FcCharSetDestroy() {} void FcCharSetAddChar() {} void FcCharSetHasChar() {} void FcCharSetCount() {} void FcCharSetIntersect() {} void FcCharSetUnion() {} void FcCharSetSubtract() {} void FcLangSetCreate() {} void FcLangSetDestroy() {} void FcLangSetAdd() {} void FcLangSetHasLang() {} void FcConfigGetFonts() {} void FcConfigGetConfigDirs() {} void FcConfigGetFontDirs() {} void FcConfigGetRescanInterval() {} void FcConfigSetRescanInterval() {} void FcConfigGetConfigFiles() {} void FcConfigGetCacheDirs() {} void FcConfigHomeDir() {} void FcConfigEnableHome() {} void FcConfigFilename() {} void FcConfigAppFontClear() {}' > /tmp/android-stubs/fontconfig.c
          ${CLANG_BIN} ${CLANG_TARGET_FLAG} -c -o /tmp/android-stubs/fontconfig.o /tmp/android-stubs/fontconfig.c
          ${NDK_BIN}/llvm-ar rcs /tmp/android-stubs/libfontconfig.a /tmp/android-stubs/fontconfig.o
          echo 'void FT_Init_FreeType() {} void FT_Done_FreeType() {} void FT_New_Face() {} void FT_Done_Face() {} void FT_New_Memory_Face() {} void FT_Open_Face() {} void FT_Attach_File() {} void FT_Attach_Stream() {} void FT_Reference_Face() {} void FT_Set_Char_Size() {} void FT_Set_Pixel_Sizes() {} void FT_Load_Glyph() {} void FT_Load_Char() {} void FT_Render_Glyph() {} void FT_Get_Kerning() {} void FT_Get_Track_Kerning() {} void FT_Get_Glyph_Name() {} void FT_Get_Postscript_Name() {} void FT_Select_Charmap() {} void FT_Set_Charmap() {} void FT_Get_Charmap_Index() {} void FT_Get_CMap_Language_ID() {} void FT_Get_CMap_Format() {} void FT_Get_First_Char() {} void FT_Get_Next_Char() {} void FT_Get_Name_Index() {} void FT_Set_Transform() {} void FT_Get_Transform() {} void FT_Glyph_Copy() {} void FT_Get_Advance() {} void FT_Library_Version() {} void FT_Face_CheckTrueTypePatents() {} void FT_Face_SetUnpatentedHinting() {}' > /tmp/android-stubs/freetype.c
          ${CLANG_BIN} ${CLANG_TARGET_FLAG} -c -o /tmp/android-stubs/freetype.o /tmp/android-stubs/freetype.c
          ${NDK_BIN}/llvm-ar rcs /tmp/android-stubs/libfreetype.a /tmp/android-stubs/freetype.o
          echo 'void XML_ParserCreate() {} void XML_ParserCreateNS() {} void XML_ParserCreate_MM() {} void XML_ParserFree() {} void XML_Parse() {} void XML_SetElementHandler() {} void XML_SetCharacterDataHandler() {} void XML_SetProcessingInstructionHandler() {} void XML_SetCommentHandler() {} void XML_SetStartCdataSectionHandler() {} void XML_SetEndCdataSectionHandler() {} void XML_SetDefaultHandler() {} void XML_SetDefaultHandlerExpand() {} void XML_SetUnparsedEntityDeclHandler() {} void XML_SetNotationDeclHandler() {} void XML_SetNamespaceDeclHandler() {} void XML_SetStartNamespaceDeclHandler() {} void XML_SetEndNamespaceDeclHandler() {} void XML_SetXmlDeclHandler() {} void XML_SetAttlistDeclHandler() {} void XML_SetEntityDeclHandler() {} void XML_SetDoctypeDeclHandler() {} void XML_SetElementDeclHandler() {} void XML_SetUserData() {} void XML_GetUserData() {} void XML_SetEncoding() {} void XML_UseForeignDTD() {} void XML_SetReturnNSTriplet() {} void XML_GetErrorCode() {} void XML_ErrorString() {} void XML_GetCurrentLineNumber() {} void XML_GetCurrentColumnNumber() {} void XML_GetCurrentByteIndex() {} void XML_GetCurrentByteCount() {} void XML_GetInputContext() {} void XML_SetBase() {} void XML_GetBase() {}' > /tmp/android-stubs/expat.c
          ${CLANG_BIN} ${CLANG_TARGET_FLAG} -c -o /tmp/android-stubs/expat.o /tmp/android-stubs/expat.c
          ${NDK_BIN}/llvm-ar rcs /tmp/android-stubs/libexpat.a /tmp/android-stubs/expat.o

          # Custom pkg-config wrapper for Android cross-compilation
          mkdir -p /tmp/android-stubs/bin
          cat > /tmp/android-stubs/bin/pkg-config << 'PKGEOF'
          #!/bin/bash
          case "$1" in
            --libs)
              case "$2" in
                fontconfig) echo "-L/tmp/android-stubs -lfontconfig -lfreetype -lexpat" ;;
                freetype2) echo "-L/tmp/android-stubs -lfreetype" ;;
                expat) echo "-L/tmp/android-stubs -lexpat" ;;
                x11) echo "-L/tmp/android-stubs -lX11" ;;
                xext) echo "-L/tmp/android-stubs -lXext" ;;
                xcursor) echo "-L/tmp/android-stubs -lXcursor" ;;
                xi) echo "-L/tmp/android-stubs -lXi" ;;
                xrender) echo "-L/tmp/android-stubs -lXrender" ;;
                xrandr) echo "-L/tmp/android-stubs -lXrandr" ;;
                xcb) echo "-L/tmp/android-stubs -lxcb" ;;
                xcb-render) echo "-L/tmp/android-stubs -lxcb-render" ;;
                xcb-shm) echo "-L/tmp/android-stubs -lxcb-shm" ;;
                *) echo "-L/tmp/android-stubs" ;;
              esac ;;
            --cflags)
              echo "-I/tmp/android-stubs/include" ;;
            --exists)
              exit 0 ;;
            --atleast-version)
              exit 0 ;;
            --modversion)
              echo "1.0" ;;
            --libs-only-l)
              case "$2" in
                fontconfig) echo "-lfontconfig -lfreetype -lexpat" ;;
                freetype2) echo "-lfreetype" ;;
                expat) echo "-lexpat" ;;
                x11) echo "-lX11" ;;
                *) echo "" ;;
              esac ;;
            --libs-only-L)
              echo "-L/tmp/android-stubs" ;;
            --libs-only-other)
              echo "" ;;
            --cflags-only-I)
              echo "-I/tmp/android-stubs/include" ;;
            --cflags-only-other)
              echo "" ;;
            *)
              /usr/bin/pkg-config "$@" 2>/dev/null || true ;;
          esac
          PKGEOF
          chmod +x /tmp/android-stubs/bin/pkg-config
          export PKG_CONFIG=/tmp/android-stubs/bin/pkg-config
          export PKG_CONFIG_ALLOW_CROSS=1
          mkdir -p /tmp/android-stubs/include/fontconfig /tmp/android-stubs/include/freetype2/freetype /tmp/android-stubs/include/expat
          echo 'typedef void* FcConfig; typedef void* FcPattern; typedef void* FcFontSet; typedef void* FcObjectSet; typedef void* FcCharSet; typedef void* FcLangSet; typedef void* FcStrSet; typedef void* FcStrList; typedef void* FcResult; typedef int FcBool; typedef int FcMatchKind; typedef void* FcValue; #define FcTrue 1 #define FcFalse 0' > /tmp/android-stubs/include/fontconfig/fontconfig.h
          echo 'typedef void* FT_Library; typedef void* FT_Face; typedef void* FT_GlyphSlot; typedef void* FT_Size; typedef void* FT_CharMap; typedef int FT_Error; typedef int FT_Bool; typedef int FT_Long; typedef int FT_Int; typedef unsigned int FT_UInt; typedef int FT_F26Dot6;' > /tmp/android-stubs/include/freetype2/freetype/freetype.h
          echo 'typedef void* XML_Parser; typedef void* XML_StartElementHandler; typedef void* XML_EndElementHandler; typedef void* XML_CharacterDataHandler;' > /tmp/android-stubs/include/expat/expat.h

          # jemalloc stub for Android
          mkdir -p /tmp/jemalloc-stub
          printf 'void je_mallocx() {}\nvoid je_dallocx() {}\nvoid je_nallocx() {}\nvoid je_rallocx() {}\nvoid je_sallocx() {}\nvoid je_mallctl() {}\nvoid je_mallctlnametomib() {}\nvoid je_mallctlbymib() {}\nvoid je_malloc_stats_print() {}\nvoid je_malloc_usable_size() {}\n' > /tmp/jemalloc-stub/jemalloc.c
          ${CLANG_BIN} ${CLANG_TARGET_FLAG} -c -o /tmp/jemalloc-stub/jemalloc.o /tmp/jemalloc-stub/jemalloc.c
          ${NDK_BIN}/llvm-ar rcs /tmp/jemalloc-stub/libjemalloc.a /tmp/jemalloc-stub/jemalloc.o
          export JEMALLOC_OVERRIDE=/tmp/jemalloc-stub/libjemalloc.a

          # Build the Rust library for Android
          cargo build --target ${{ matrix.target }} --features embed-useragent-stylesheets --release --lib --no-default-features

      - name: Prepare APK native libs
        run: |
          mkdir -p support/android/apk/servoapp/src/main/jniLibs/${{ matrix.abi }}
          cp target/${{ matrix.target }}/release/libeesha.so support/android/apk/servoapp/src/main/jniLibs/${{ matrix.abi }}/

      - name: Build APK
        working-directory: support/android/apk
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease -Pandroid.nativeLibsDirectory=src/main/jniLibs

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: eesha-${{ matrix.abi }}-android
          path: support/android/apk/servoapp/build/outputs/apk/release/*.apk

      - name: Make archive
        run: |
          cp target/${{ matrix.target }}/release/libeesha.so .
          tar -czvf eesha-${{ matrix.target }}.tar.gz libeesha.so

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: eesha-${{ matrix.target }}-lib
          path: eesha-${{ matrix.target }}.tar.gz

  build-ios:
    name: iOS (${{ matrix.target }})
    runs-on: macos-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-ios
          - aarch64-apple-ios-sim
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dsherret/rust-toolchain-file@v1

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.8

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install mako
        run: python -m pip install mako

      - name: Install dependencies
        run: brew install cmake

      - name: Update dependencies
        run: cargo update

      - name: Build
        env:
          SCCACHE_GHA_ENABLED: true
          RUSTC_WRAPPER: sccache
        run: |
          if [ "${{ matrix.target }}" = "aarch64-apple-ios-sim" ]; then
            CLANG_TARGET="arm64-apple-ios14.0-simulator"
            SDK=$(xcrun --sdk iphonesimulator --show-sdk-path)
          else
            CLANG_TARGET="arm64-apple-ios14.0"
            SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          fi

          # jemalloc doesn't support iOS - provide a stub
          mkdir -p /tmp/jemalloc-stub
          printf 'void je_mallocx() {}\nvoid je_dallocx() {}\nvoid je_nallocx() {}\nvoid je_rallocx() {}\nvoid je_sallocx() {}\nvoid je_mallctl() {}\nvoid je_mallctlnametomib() {}\nvoid je_mallctlbymib() {}\nvoid je_malloc_stats_print() {}\nvoid je_malloc_usable_size() {}\n' > /tmp/jemalloc-stub/jemalloc.c
          clang -c -target "$CLANG_TARGET" -isysroot "$SDK" -o /tmp/jemalloc-stub/jemalloc.o /tmp/jemalloc-stub/jemalloc.c
          ar rcs /tmp/jemalloc-stub/libjemalloc.a /tmp/jemalloc-stub/jemalloc.o
          export JEMALLOC_OVERRIDE=/tmp/jemalloc-stub/libjemalloc.a

          export CARGO_TARGET_AARCH64_APPLE_IOS_RUSTFLAGS="-C link-arg=-framework -C link-arg=Foundation -C link-arg=-framework -C link-arg=UIKit -C link-arg=-framework -C link-arg=OpenGLES"
          export CARGO_TARGET_AARCH64_APPLE_IOS_SIM_RUSTFLAGS="-C link-arg=-framework -C link-arg=Foundation -C link-arg=-framework -C link-arg=UIKit -C link-arg=-framework -C link-arg=OpenGLES"

          # NOTE: surfman (Servo's GPU surface management library) does not natively
          # support iOS. This build will likely fail at the surfman compilation step.
          # iOS support requires upstream changes to surfman or a replacement surface library.
          cargo build --target ${{ matrix.target }} --features embed-useragent-stylesheets --release --no-default-features

      - name: Make archive
        working-directory: ./target/${{ matrix.target }}/release
        run: |
          if [ -f libeesha.a ]; then
            tar -czvf eesha-${{ matrix.target }}.tar.gz libeesha.a
          else
            echo "Warning: libeesha.a not found, creating empty archive"
            touch eesha-${{ matrix.target }}.tar.gz
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eesha-${{ matrix.target }}
          path: ./target/${{ matrix.target }}/release/eesha-${{ matrix.target }}.tar.gz

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
      - build-macos
      - build-android
      - build-ios
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dsherret/rust-toolchain-file@v1

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts/

      - name: Publish release
        run: |
          RELEASE_TAG=eesha-v$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.name == "eesha") | .version')
          git fetch --tags --quiet
          if ! git show-ref --tags --verify --quiet "refs/tags/${RELEASE_TAG}" ; then
            gh release create ${RELEASE_TAG} ./artifacts/*.tar.gz ./artifacts/*.apk --prerelease --title "Eesha $(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.name == "eesha") | .version')" --notes "Eesha browser build for all platforms

          ## Platforms
          - **Linux** (x86_64) - tar.gz archive
          - **Windows** (x86_64) - tar.gz archive with ANGLE DLLs
          - **macOS** (ARM/Apple Silicon & Intel) - tar.gz archives
          - **Android** (arm64-v8a, armeabi-v7a, x86_64) - APK files
          - **iOS** (arm64 device & simulator) - static library archives (experimental)

          ## Notes
          - iOS builds are experimental. Servo's surfman library does not natively support iOS.
          - For Android, each ABI has a separate APK."
          fi
