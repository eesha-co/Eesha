name: Release Eesha

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dsherret/rust-toolchain-file@v1

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.8

      # https://github.com/servo/servo/blob/a0730d7154e183a9b2d9a9282061e6c67d87a263/.github/workflows/linux.yml#L141
      - name: Set LIBCLANG_PATH # This is needed for bindgen in mozangle.
        run: echo "LIBCLANG_PATH=/usr/lib/llvm-14/lib" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt install build-essential python3-pip ccache clang cmake curl \
            g++ git gperf libdbus-1-dev libfreetype6-dev libgl1-mesa-dri \
            libgles2-mesa-dev libglib2.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good libgstreamer-plugins-good1.0-dev \
            gstreamer1.0-plugins-bad libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-plugins-ugly gstreamer1.0-plugins-base \
            libgstreamer-plugins-base1.0-dev gstreamer1.0-libav \
            libgstrtspserver-1.0-dev gstreamer1.0-tools libges-1.0-dev \
            libharfbuzz-dev liblzma-dev libunwind-dev libvulkan1 \
            libx11-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxmu-dev libxmu6 libegl1-mesa-dev llvm-dev m4 xorg-dev sway \
            python3-mako

      - name: Build
        env:
          SCCACHE_GHA_ENABLED: true
          RUSTC_WRAPPER: sccache
        run: cargo build --features embed-useragent-stylesheets --release

      - name: Make archive
        run: |
          mkdir -p eesha-release
          cp target/release/eesha eesha-release/
          cp -r resources eesha-release/
          cd eesha-release && tar -czvf ../eesha-x86_64-unknown-linux-gnu.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eesha-x86_64-unknown-linux-gnu
          path: ./eesha-x86_64-unknown-linux-gnu.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dsherret/rust-toolchain-file@v1

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.8

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install mako
        run: python -m pip install mako

      - name: Install scoop
        uses: MinoruSekine/setup-scoop@v4

      - name: Install dependencies
        run: |
          scoop install cmake

      - name: Upgrade LLVM
        run: choco upgrade llvm -y

      - name: Build
        env:
          SCCACHE_GHA_ENABLED: true
          RUSTC_WRAPPER: sccache
        run: cargo build --features embed-useragent-stylesheets --release

      - name: Make archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path eesha-release
          Copy-Item target\release\eesha.exe eesha-release\
          Copy-Item -Recurse -Force resources eesha-release\resources
          Copy-Item -Recurse -Force icons eesha-release\icons
          # Copy ANGLE DLLs (libEGL.dll, libGLESv2.dll) from build output
          # These are needed for OpenGL ES rendering on Windows via ANGLE
          Get-ChildItem -Path "target\release\build" -Recurse -Filter "libEGL.dll" | ForEach-Object { Copy-Item $_.FullName eesha-release\ }
          Get-ChildItem -Path "target\release\build" -Recurse -Filter "libGLESv2.dll" | ForEach-Object { Copy-Item $_.FullName eesha-release\ }
          cd eesha-release
          tar -czvf ..\eesha-x86_64-pc-windows-msvc.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eesha-x86_64-pc-windows-msvc
          path: ./eesha-x86_64-pc-windows-msvc.tar.gz

  build-mac:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
          - target: x86_64-apple-darwin
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dsherret/rust-toolchain-file@v1

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.8

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install mako
        run: python -m pip install mako

      - name: Install dependencies
        run: brew install cmake gstreamer gst-plugins-base gst-plugins-good gst-plugins-bad gst-libav

      - name: Add rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        env:
          SCCACHE_GHA_ENABLED: true
          RUSTC_WRAPPER: sccache
        run: cargo build --target ${{ matrix.target }} --features embed-useragent-stylesheets --release

      - name: Make archive
        run: |
          mkdir -p eesha-release
          cp target/${{ matrix.target }}/release/eesha eesha-release/
          cp -r resources eesha-release/
          cp -r icons eesha-release/
          cd eesha-release && tar -czvf ../eesha-${{ matrix.target }}.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eesha-${{ matrix.target }}
          path: ./eesha-${{ matrix.target }}.tar.gz

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
      - build-mac
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dsherret/rust-toolchain-file@v1

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Publish release
        run: |
          RELEASE_TAG=eesha-v$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.name == "eesha") | .version')
          git fetch --tags --quiet
          if ! git show-ref --tags --verify --quiet "refs/tags/${RELEASE_TAG}" ; then
            gh release create ${RELEASE_TAG} ./artifacts/*.tar.gz
          fi
