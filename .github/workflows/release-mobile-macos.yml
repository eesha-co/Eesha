name: Mobile & macOS Release

on:
  workflow_dispatch:

env:
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build-android:
    name: Android (${{ matrix.abi }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-linux-android
          - armv7-linux-androideabi
        include:
          - target: aarch64-linux-android
            abi: arm64-v8a
            ndk_llvm_target: aarch64-linux-android
            ndk_lib_dir: aarch64-linux-android
          - target: armv7-linux-androideabi
            abi: armeabi-v7a
            ndk_llvm_target: armv7-linux-androideabi
            # NDK r26c uses armv7a (with 'a') for the sysroot lib directory
            ndk_lib_dir: armv7a-linux-androideabi
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dsherret/rust-toolchain-file@v1

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.8

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26c

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt install build-essential python3-pip clang cmake curl \
            g++ git gperf libdbus-1-dev libfreetype6-dev libgl1-mesa-dri \
            libgles2-mesa-dev libglib2.0-dev libharfbuzz-dev liblzma-dev \
            libssl-dev libunwind-dev libvulkan1 libx11-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxmu-dev libxmu6 libegl1-mesa-dev llvm-dev m4 xorg-dev \
            python3-mako

      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=/usr/lib/llvm-14/lib" >> $GITHUB_ENV

      - name: Build native library
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
          SCCACHE_GHA_ENABLED: true
          RUSTC_WRAPPER: sccache
          OPENSSL_NO_VENDOR: "0"
          OPENSSL_NO_ASM: "1"
          ANDROID_ABI: ${{ matrix.abi }}
          ANDROID_PLATFORM: android-21
          ANDROID_API_LEVEL: "21"
        run: |
          NDK_BIN="${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          NDK_SYSROOT="${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          ANDROID_API=21
          export ANDROID_API_LEVEL=21
          NDK_LLVM_TARGET="${{ matrix.ndk_llvm_target }}"

          # Find the clang binary for this target
          CLANG_BIN=$(ls ${NDK_BIN}/${NDK_LLVM_TARGET}${ANDROID_API}-clang 2>/dev/null || true)
          if [ -z "${CLANG_BIN}" ]; then
            CLANG_BIN=$(ls ${NDK_BIN}/${NDK_LLVM_TARGET}*-clang 2>/dev/null | head -1 || true)
          fi
          if [ -z "${CLANG_BIN}" ]; then
            CLANG_BIN="${NDK_BIN}/clang"
          fi
          echo "Using clang: ${CLANG_BIN}"
          CLANGXX_BIN="${CLANG_BIN%clang}clang++"
          if [ ! -f "${CLANGXX_BIN}" ]; then
            CLANGXX_BIN="${NDK_BIN}/clang++"
          fi

          CLANG_TARGET_FLAG="--target=${NDK_LLVM_TARGET}${ANDROID_API}"

          # Set up cargo linker config
          mkdir -p .cargo
          echo "[target.${{ matrix.target }}]" >> .cargo/config.toml
          echo "linker = \"${CLANG_BIN}\"" >> .cargo/config.toml
          echo "ar = \"${NDK_BIN}/llvm-ar\"" >> .cargo/config.toml

          # CRITICAL: Only use TARGET-SPECIFIC env vars for CC/CXX/AR
          CARGO_TARGET=$(echo "${{ matrix.target }}" | tr '-' '_')
          export "CC_${CARGO_TARGET}"="${CLANG_BIN}"
          export "CXX_${CARGO_TARGET}"="${CLANGXX_BIN}"
          export "AR_${CARGO_TARGET}"="${NDK_BIN}/llvm-ar"
          export "RANLIB_${CARGO_TARGET}"="${NDK_BIN}/llvm-ranlib"
          export "CFLAGS_${CARGO_TARGET}"="-U__ANDROID_API__ -D__ANDROID_API__=${ANDROID_API} --sysroot=${NDK_SYSROOT} -I${NDK_SYSROOT}/usr/include/c++/v1 ${CLANG_TARGET_FLAG}"
          export "CXXFLAGS_${CARGO_TARGET}"="-U__ANDROID_API__ -D__ANDROID_API__=${ANDROID_API} --sysroot=${NDK_SYSROOT} -I${NDK_SYSROOT}/usr/include/c++/v1 -stdlib=libc++ -std=c++17 ${CLANG_TARGET_FLAG}"

          # Add NDK sysroot library search paths to RUSTFLAGS
          # NOTE: The sysroot lib directory name differs from the LLVM target name for armv7:
          #   arm64 -> aarch64-linux-android (same)
          #   armv7 -> armv7a-linux-androideabi (extra 'a')
          NDK_LIB_DIR="${NDK_SYSROOT}/usr/lib/${{ matrix.ndk_lib_dir }}"
          CARGO_TARGET_ENV=$(echo "${{ matrix.target }}" | tr '-' '_' | tr 'a-z' 'A-Z')
          RUSTFLAGS_VAL="-L ${NDK_LIB_DIR}/${ANDROID_API} -L ${NDK_LIB_DIR} -L ${NDK_SYSROOT}/usr/lib -C link-arg=-L${NDK_LIB_DIR}/${ANDROID_API} -C link-arg=-L${NDK_LIB_DIR}"
          export "CARGO_TARGET_${CARGO_TARGET_ENV}_RUSTFLAGS=${RUSTFLAGS_VAL}"
          echo "RUSTFLAGS for ${{ matrix.target }}: ${RUSTFLAGS_VAL}"

          # Build the Rust library for Android
          cargo build --target ${{ matrix.target }} --features embed-useragent-stylesheets --release --lib --no-default-features

      - name: Prepare APK native libs
        run: |
          mkdir -p support/android/apk/servoapp/src/main/jniLibs/${{ matrix.abi }}
          cp target/${{ matrix.target }}/release/libeesha.so support/android/apk/servoapp/src/main/jniLibs/${{ matrix.abi }}/

      - name: Build APK
        working-directory: support/android/apk
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease -Pandroid.nativeLibsDirectory=src/main/jniLibs

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: eesha-${{ matrix.abi }}-android
          path: support/android/apk/servoapp/build/outputs/apk/release/*.apk

      - name: Make archive
        run: |
          cp target/${{ matrix.target }}/release/libeesha.so .
          tar -czvf eesha-${{ matrix.target }}.tar.gz libeesha.so

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: eesha-${{ matrix.target }}-lib
          path: eesha-${{ matrix.target }}.tar.gz

  build-ios:
    name: iOS (${{ matrix.target }})
    runs-on: macos-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-ios
          - aarch64-apple-ios-sim
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dsherret/rust-toolchain-file@v1

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.8

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install mako
        run: python -m pip install mako

      - name: Install dependencies
        run: brew install cmake llvm

      - name: Build
        env:
          SCCACHE_GHA_ENABLED: true
          RUSTC_WRAPPER: sccache
          LIBCLANG_PATH: /opt/homebrew/opt/llvm/lib
        run: |
          if [ "${{ matrix.target }}" = "aarch64-apple-ios-sim" ]; then
            CLANG_TARGET="arm64-apple-ios14.0-simulator"
            SDK=$(xcrun --sdk iphonesimulator --show-sdk-path)
          else
            CLANG_TARGET="arm64-apple-ios14.0"
            SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          fi

          echo "Building for ${{ matrix.target }}"
          echo "  CLANG_TARGET: ${CLANG_TARGET}"
          echo "  SDK: ${SDK}"

          # Set CC/CXX for the target
          CARGO_TARGET_ENV=$(echo "${{ matrix.target }}" | tr '-' '_' | tr 'a-z' 'A-Z')
          export "CC_${CARGO_TARGET_ENV}"="clang"
          export "CXX_${CARGO_TARGET_ENV}"="clang++"
          export "CFLAGS_${CARGO_TARGET_ENV}"="-target ${CLANG_TARGET} -isysroot ${SDK} -iframework ${SDK}/System/Library/Frameworks"
          export "CXXFLAGS_${CARGO_TARGET_ENV}"="-target ${CLANG_TARGET} -isysroot ${SDK} -iframework ${SDK}/System/Library/Frameworks -std=c++17"
          export "AR_${CARGO_TARGET_ENV}"="ar"

          # Set up cargo linker config for iOS
          mkdir -p .cargo
          echo "[target.${{ matrix.target }}]" >> .cargo/config.toml
          echo "linker = \"clang\"" >> .cargo/config.toml
          echo "ar = \"ar\"" >> .cargo/config.toml

          # RUSTFLAGS for iOS linking
          RUSTFLAGS_VAL="-C link-arg=-target -C link-arg=${CLANG_TARGET} -C link-arg=-isysroot -C link-arg=${SDK} -C link-arg=-framework -C link-arg=Foundation -C link-arg=-framework -C link-arg=UIKit -C link-arg=-framework -C link-arg=OpenGLES -C link-arg=-framework -C link-arg=CoreGraphics -C link-arg=-framework -C link-arg=CoreText -C link-arg=-framework -C link-arg=QuartzCore -C link-arg=-framework -C link-arg=MobileCoreServices -C link-arg=-L${SDK}/usr/lib"
          export "CARGO_TARGET_${CARGO_TARGET_ENV}_RUSTFLAGS=${RUSTFLAGS_VAL}"

          cargo build --target ${{ matrix.target }} --features embed-useragent-stylesheets --release --no-default-features

      - name: Make archive
        working-directory: ./target/${{ matrix.target }}/release
        run: |
          if [ -f libeesha.a ]; then
            tar -czvf eesha-${{ matrix.target }}.tar.gz libeesha.a
          else
            echo "Warning: libeesha.a not found, creating empty archive"
            touch eesha-${{ matrix.target }}.tar.gz
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eesha-${{ matrix.target }}
          path: ./target/${{ matrix.target }}/release/eesha-${{ matrix.target }}.tar.gz

  build-macos:
    name: macOS (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dsherret/rust-toolchain-file@v1

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.8

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install mako
        run: python -m pip install mako

      - name: Install dependencies
        run: |
          brew install cmake gstreamer gst-plugins-base gst-plugins-good gst-plugins-bad gst-libav

      - name: Build
        env:
          SCCACHE_GHA_ENABLED: true
          RUSTC_WRAPPER: sccache
        run: |
          export PATH="/Library/Frameworks/GStreamer.framework/Versions/1.0/bin:$PATH"
          export DYLD_LIBRARY_PATH="/Library/Frameworks/GStreamer.framework/Versions/1.0/lib"
          cargo build --target ${{ matrix.target }} --features embed-useragent-stylesheets --release

      - name: Make archive
        run: |
          mkdir -p eesha-release
          cp target/${{ matrix.target }}/release/eesha eesha-release/
          cp -r resources eesha-release/
          cp -r icons eesha-release/
          cd eesha-release && tar -czvf ../eesha-${{ matrix.target }}.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eesha-${{ matrix.target }}
          path: ./eesha-${{ matrix.target }}.tar.gz

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-android
      - build-ios
      - build-macos
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dsherret/rust-toolchain-file@v1

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: List artifacts
        run: ls -laR artifacts/

      - name: Filter valid artifacts
        run: |
          mkdir -p valid-artifacts
          find artifacts/ -type f \( -name "*.tar.gz" -o -name "*.apk" \) | while read f; do
            SIZE=$(stat -c%s "$f" 2>/dev/null || echo 0)
            if [ "$SIZE" -gt 1024 ]; then
              cp "$f" valid-artifacts/
              echo "✅ Including: $(basename $f) (${SIZE} bytes)"
            else
              echo "❌ Skipping (too small/empty): $(basename $f) (${SIZE} bytes)"
            fi
          done

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG=eesha-v$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.name == "eesha") | .version')-mobile-macos
          git fetch --tags --quiet

          ARTIFACT_FILES=$(find valid-artifacts/ -type f \( -name "*.tar.gz" -o -name "*.apk" \) | sort)
          if [ -z "$ARTIFACT_FILES" ]; then
            echo "⚠️ No valid artifacts to upload"
            exit 0
          fi

          if git show-ref --tags --verify --quiet "refs/tags/${RELEASE_TAG}"; then
            echo "📌 Release ${RELEASE_TAG} already exists, uploading additional assets..."
            for f in $ARTIFACT_FILES; do
              ASSET_NAME=$(basename "$f")
              echo "  Uploading: ${ASSET_NAME}"
              gh release upload ${RELEASE_TAG} "$f" --clobber 2>/dev/null || echo "  ⚠️ Failed to upload ${ASSET_NAME}"
            done
          else
            echo "🚀 Creating new release ${RELEASE_TAG}..."
            gh release create ${RELEASE_TAG} $ARTIFACT_FILES --prerelease \
              --title "Eesha Mobile & macOS Build" \
              --notes "Eesha browser build for mobile and macOS platforms

          ## Platforms
          - **Android** (arm64-v8a, armeabi-v7a) - APK files and native libraries
          - **iOS** (arm64 device & simulator) - static library archives
          - **macOS** (ARM & Intel) - tar.gz archives

          ## Notes
          - iOS builds use the eesha-co/surfman fork with EAGL backend support.
          - For Android, each ABI has a separate APK and native library archive.
          - This is a pre-release build. Not all platforms may be available yet."
          fi
