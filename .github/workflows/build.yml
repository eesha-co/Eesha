name: Build & Release Eesha

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  EESHA_VERSION: "0.5.0"

jobs:
  # ─── Desktop Build (Electron) ────────────────────────────────────
  build-desktop-linux:
    name: Desktop (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: desktop
        run: npm install

      - name: Build Linux
        working-directory: desktop
        run: npx electron-builder --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eesha-linux
          path: |
            desktop/dist/*.AppImage

  build-desktop-win:
    name: Desktop (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: desktop
        run: npm install

      - name: Build Windows
        working-directory: desktop
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build output
        working-directory: desktop/dist
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -File | ForEach-Object {
            Write-Host "$($_.FullName) ($([math]::Round($_.Length/1MB,1))MB)"
          }

      - name: Ensure exe extension
        working-directory: desktop/dist
        shell: pwsh
        run: |
          # Find any file > 10MB without extension (portable exe without .exe)
          Get-ChildItem -File | Where-Object { $_.Extension -eq '' -and $_.Length -gt 10MB } | ForEach-Object {
            $newName = "$($_.BaseName)-portable.exe"
            Rename-Item $_.FullName $newName
            Write-Host "Renamed $($_.Name) to $newName"
          }
          # List all files after rename
          Get-ChildItem -File | ForEach-Object { Write-Host "$($_.Name) ($([math]::Round($_.Length/1MB,1))MB)" }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eesha-windows
          path: |
            desktop/dist/*.exe

  build-desktop-mac:
    name: Desktop (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: desktop
        run: npm install

      - name: Build macOS
        working-directory: desktop
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eesha-macos
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.zip

  # ─── Android Build (WebView/Chromium) ─────────────────────────────
  build-android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: Install Android build tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Create Gradle wrapper
        working-directory: android
        run: |
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          sed -i 's/^          //' gradle/wrapper/gradle-wrapper.properties

      - name: Create gradlew script
        working-directory: android
        run: |
          cat > gradlew << 'GRADLEW'
          #!/bin/sh
          APP_BASE_NAME=`basename "$0"`
          APP_HOME=`pwd -P`
          CLASSPATH="$APP_HOME/gradle/wrapper/gradle-wrapper.jar"
          exec java -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"
          GRADLEW
          chmod +x gradlew

      - name: Download Gradle wrapper JAR
        working-directory: android
        run: |
          curl -sSL https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: eesha-android
          path: android/app/build/outputs/apk/debug/*.apk

  # ─── iOS Build (WKWebView/WebKit) ─────────────────────────────────
  build-ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: |
          chmod +x create_xcodeproj.sh
          ./create_xcodeproj.sh

      - name: Build iOS
        working-directory: ios
        run: |
          xcodebuild -project Eesha.xcodeproj \
            -scheme Eesha \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build \
            | tail -20

      - name: Package iOS app
        working-directory: ios
        run: |
          APP_PATH=$(find build -name "Eesha.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            mkdir -p packaging
            cp -r "$APP_PATH" packaging/Eesha.app
            cd packaging
            zip -r ../eesha-ios-app.zip Eesha.app
            echo "iOS app packaged successfully"
          else
            echo "No .app found, packaging source instead"
            tar -czvf eesha-ios-source.tar.gz Eesha/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eesha-ios
          path: |
            ios/eesha-ios-app.zip
            ios/eesha-ios-source.tar.gz

  # ─── Publish Release ──────────────────────────────────────────────
  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-desktop-linux
      - build-desktop-win
      - build-desktop-mac
      - build-android
      - build-ios
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: List artifacts
        run: ls -laR artifacts/

      - name: Collect valid release files
        run: |
          mkdir -p release-files
          # Copy known binary artifacts (> 1KB to skip empty/dummy files)
          find artifacts/ -type f \( -name "*.AppImage" -o -name "*.exe" -o -name "*.dmg" -o -name "*.zip" -o -name "*.apk" -o -name "*.tar.gz" \) | while read f; do
            SIZE=$(stat -c%s "$f" 2>/dev/null || echo 0)
            if [ "$SIZE" -gt 1024 ]; then
              cp "$f" release-files/
              echo "Including: $(basename $f) ($(($SIZE/1024))KB)"
            fi
          done
          # Also handle files without extensions that are large (Windows portable exe)
          find artifacts/ -type f ! -name "*.*" | while read f; do
            SIZE=$(stat -c%s "$f" 2>/dev/null || echo 0)
            if [ "$SIZE" -gt 10000000 ]; then
              cp "$f" "release-files/Eesha-${{ env.EESHA_VERSION }}-portable.exe"
              echo "Including (renamed): $(basename $f) -> Eesha-${{ env.EESHA_VERSION }}-portable.exe"
            fi
          done
          echo "--- Final release files ---"
          ls -la release-files/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG=eesha-v${{ env.EESHA_VERSION }}

          ARTIFACT_COUNT=$(find release-files/ -type f | wc -l)
          if [ "$ARTIFACT_COUNT" -eq 0 ]; then
            echo "No valid release files found!"
            exit 1
          fi

          echo "Creating release ${RELEASE_TAG} with ${ARTIFACT_COUNT} files..."

          # Delete existing release if it exists (to update)
          git fetch --tags --quiet
          if git show-ref --tags --verify --quiet "refs/tags/${RELEASE_TAG}"; then
            echo "Deleting existing release ${RELEASE_TAG}..."
            gh release delete ${RELEASE_TAG} --yes || true
            git push origin :refs/tags/${RELEASE_TAG} --quiet || true
          fi

          # Create new release with all artifacts
          find release-files/ -type f -print0 | xargs -0 gh release create ${RELEASE_TAG} --prerelease \
            --title "Eesha ${{ env.EESHA_VERSION }}" \
            --notes "Eesha Browser v${{ env.EESHA_VERSION }}

          ## Desktop (Electron + Chromium)
          - **Linux**: AppImage (universal) - Download, make executable (chmod +x), and run
          - **Windows**: Portable .exe - Download and run directly
          - **macOS**: .dmg (Apple Silicon) - Download, open, drag to Applications

          ## Mobile
          - **Android**: .apk (WebView/Chromium-based) - Download and install (enable Install from unknown sources)
          - **iOS**: Source code (requires Xcode + Apple Developer account to build)

          ## What's New in v0.5.0
          - New official Eesha icon across all platforms
          - Google Chrome-style new tab page (white, clean, with shortcuts)
          - Eesha logo watermark as subtle background on new tab
          - Splash screen uses only the logo (no double images)
          - Watermark more visible (0.12 opacity)
          - Single logo file (eesha-logo.png) used everywhere
          - Windows portable exe included in releases

          ## Installation
          - **Linux**: Download .AppImage, make executable (chmod +x), and run
          - **Windows**: Download .exe and run (portable, no installation needed)
          - **macOS**: Download .dmg, open, drag to Applications
          - **Android**: Download .apk and install (enable Install from unknown sources)
          - **iOS**: Requires building from source with Xcode"