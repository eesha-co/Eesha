name: Build & Release Eesha

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  EESHA_VERSION: "0.2.0"

jobs:
  # ─── Android Build (WebView/Chromium) ─────────────────────────────
  build-android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Gradle wrapper
        working-directory: android
        run: |
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Create gradlew script
        working-directory: android
        run: |
          cat > gradlew << 'GRADLEW'
          #!/bin/sh
          APP_BASE_NAME=`basename "$0"`
          APP_HOME=`pwd -P`
          CLASSPATH="$APP_HOME/gradle/wrapper/gradle-wrapper.jar"
          exec java -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"
          GRADLEW
          chmod +x gradlew

      - name: Download Gradle wrapper JAR
        working-directory: android
        run: |
          curl -sSL https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: eesha-android
          path: android/app/build/outputs/apk/release/*.apk

  # ─── iOS Build (WKWebView/WebKit) ─────────────────────────────────
  build-ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Xcode project
        working-directory: ios
        run: |
          # Create a minimal Package.swift or Xcode project
          # For now, we'll package the source code
          mkdir -p Eesha.xcodeproj

      - name: Package iOS source
        run: |
          mkdir -p eesha-ios-release
          cp -r ios/Eesha eesha-ios-release/Eesha
          cp -r shared/icons eesha-ios-release/icons
          cd eesha-ios-release && tar -czvf ../eesha-ios-source.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eesha-ios-source
          path: eesha-ios-source.tar.gz

  # ─── Publish Release ──────────────────────────────────────────────
  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-android
      - build-ios
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: List artifacts
        run: ls -laR artifacts/

      - name: Filter valid artifacts
        run: |
          mkdir -p valid-artifacts
          find artifacts/ -type f \( -name "*.tar.gz" -o -name "*.apk" \) | while read f; do
            SIZE=$(stat -c%s "$f" 2>/dev/null || echo 0)
            if [ "$SIZE" -gt 1024 ]; then
              cp "$f" valid-artifacts/
              echo "Including: $(basename $f) (${SIZE} bytes)"
            else
              echo "Skipping (too small): $(basename $f) (${SIZE} bytes)"
            fi
          done

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG=eesha-v${{ env.EESHA_VERSION }}
          ARTIFACT_FILES=$(find valid-artifacts/ -type f \( -name "*.tar.gz" -o -name "*.apk" \) | sort)

          if [ -z "$ARTIFACT_FILES" ]; then
            echo "No valid artifacts"
            exit 0
          fi

          git fetch --tags --quiet
          if git show-ref --tags --verify --quiet "refs/tags/${RELEASE_TAG}"; then
            echo "Updating release ${RELEASE_TAG}..."
            for f in $ARTIFACT_FILES; do
              gh release upload ${RELEASE_TAG} "$f" --clobber 2>/dev/null || true
            done
          else
            echo "Creating release ${RELEASE_TAG}..."
            gh release create ${RELEASE_TAG} $ARTIFACT_FILES --prerelease \
              --title "Eesha ${{ env.EESHA_VERSION }}" \
              --notes "Eesha Browser v${{ env.EESHA_VERSION }} — Blink/Chromium-powered

          ## Platforms
          - **Android** — WebView/Chromium-based APK
          - **iOS** — WKWebView/WebKit source (Xcode project required)

          ## What's New
          - Engine switch from Servo to Blink (Chromium)
          - Built-in ad/tracker blocking
          - Custom Eesha new tab page with DuckDuckGo search
          - Privacy-first: no Google telemetry, HTTPS-only
          - Android and iOS support"
          fi
