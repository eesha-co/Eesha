name: Eesha
options:
  bundleIdPrefix: org.eesha
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""

targets:
  Eesha:
    type: application
    platform: iOS
    sources:
      - path: Eesha
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.eesha.browser
        INFOPLIST_FILE: Eesha/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.6.2"
        CURRENT_PROJECT_VERSION: "8"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: true
        GENERATE_INFOPLIST_FILE: false
    entitlements:
      path: Eesha/Eesha.entitlements
