<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab - Eesha</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #1a1a2e 40%, #16213e 100%);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 20%, rgba(232, 87, 42, 0.06) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(66, 133, 244, 0.04) 0%, transparent 50%);
      pointer-events: none;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      max-width: 680px;
      width: 100%;
      padding: 48px 32px 32px;
      position: relative;
      z-index: 1;
    }

    /* Branding */
    .brand {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      width: 80px;
      height: 80px;
      filter: drop-shadow(0 4px 16px rgba(232, 87, 42, 0.25));
    }

    .brand h1 {
      font-size: 36px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
    }

    .brand p {
      font-size: 13px;
      color: #8888aa;
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Search */
    .search-wrapper {
      width: 100%;
      position: relative;
    }

    .search-bar {
      width: 100%;
      padding: 16px 20px 16px 52px;
      background: rgba(22, 33, 62, 0.8);
      border: 1.5px solid #2a2a4a;
      border-radius: 16px;
      color: #f0f0f0;
      font-size: 16px;
      outline: none;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
      backdrop-filter: blur(8px);
    }

    .search-bar::placeholder {
      color: #5a5a7a;
    }

    .search-bar:focus {
      border-color: #E8572A;
      box-shadow: 0 0 0 3px rgba(232, 87, 42, 0.15), 0 8px 32px rgba(0, 0, 0, 0.2);
      background: rgba(22, 33, 62, 0.95);
    }

    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #5a5a7a;
      pointer-events: none;
      transition: color 0.25s ease;
    }

    .search-bar:focus ~ .search-icon {
      color: #E8572A;
    }

    /* Quick Links */
    .quick-links {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      width: 100%;
    }

    @media (max-width: 480px) {
      .quick-links {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .quick-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 18px 12px;
      background: rgba(22, 33, 62, 0.6);
      border: 1px solid #2a2a4a;
      border-radius: 14px;
      text-decoration: none;
      color: #c0c0d0;
      transition: all 0.25s ease;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }

    .quick-link:hover {
      background: rgba(30, 45, 75, 0.8);
      border-color: #E8572A;
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      color: #f0f0f0;
    }

    .quick-link-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      transition: transform 0.2s ease;
    }

    .quick-link:hover .quick-link-icon {
      transform: scale(1.1);
    }

    .quick-link-label {
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    /* Footer */
    .footer {
      position: absolute;
      bottom: 20px;
      font-size: 11px;
      color: #3a3a5a;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Branding -->
    <div class="brand">
      <img class="brand-icon" src="eesha://resources/eesha-logo.png" alt="Eesha" />
      <h1>Eesha</h1>
      <p>Fast. Private. Yours.</p>
    </div>

    <!-- Search Bar -->
    <div class="search-wrapper">
      <input
        type="text"
        class="search-bar"
        id="searchInput"
        placeholder="Search the web or enter a URL..."
        autocomplete="off"
        autofocus
      />
      <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
    </div>

    <!-- Quick Links -->
    <div class="quick-links">
      <a class="quick-link" href="https://www.google.com">
        <div class="quick-link-icon" style="background: linear-gradient(135deg, #4285F4, #34A853);">G</div>
        <span class="quick-link-label">Google</span>
      </a>
      <a class="quick-link" href="https://www.wikipedia.org">
        <div class="quick-link-icon" style="background: linear-gradient(135deg, #636466, #3a3a3c);">W</div>
        <span class="quick-link-label">Wikipedia</span>
      </a>
      <a class="quick-link" href="https://github.com">
        <div class="quick-link-icon" style="background: linear-gradient(135deg, #333, #24292e);">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
        </div>
        <span class="quick-link-label">GitHub</span>
      </a>
      <a class="quick-link" href="https://www.reddit.com">
        <div class="quick-link-icon" style="background: linear-gradient(135deg, #FF4500, #FF6B35);">R</div>
        <span class="quick-link-label">Reddit</span>
      </a>
      <a class="quick-link" href="https://www.youtube.com">
        <div class="quick-link-icon" style="background: linear-gradient(135deg, #FF0000, #CC0000);">Y</div>
        <span class="quick-link-label">YouTube</span>
      </a>
      <a class="quick-link" href="https://news.ycombinator.com">
        <div class="quick-link-icon" style="background: linear-gradient(135deg, #FF6600, #FF8533);">H</div>
        <span class="quick-link-label">Hacker News</span>
      </a>
      <a class="quick-link" href="https://stackoverflow.com">
        <div class="quick-link-icon" style="background: linear-gradient(135deg, #F48024, #E36D25);">S</div>
        <span class="quick-link-label">Stack Overflow</span>
      </a>
      <a class="quick-link" href="https://www.mozilla.org">
        <div class="quick-link-icon" style="background: linear-gradient(135deg, #000, #333);">M</div>
        <span class="quick-link-label">Mozilla</span>
      </a>
    </div>
  </div>

  <div class="footer">Eesha Browser v0.1.1 &mdash; Powered by Servo</div>

  <script>
    (function() {
      var searchInput = document.getElementById('searchInput');

      searchInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          var query = searchInput.value.trim();
          if (query) {
            if (/^https?:\/\//i.test(query)) {
              window.location.href = query;
            } else if (/^[a-zA-Z0-9-]+\.[a-zA-Z]{2,}/.test(query)) {
              window.location.href = 'https://' + query;
            } else {
              window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(query);
            }
          }
        }
      });
    })();
  </script>
</body>
</html>
