<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab - Eesha</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #1a1a2e 40%, #16213e 100%);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 20%, rgba(232, 87, 42, 0.06) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(66, 133, 244, 0.04) 0%, transparent 50%);
      pointer-events: none;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      max-width: 680px;
      width: 100%;
      padding: 48px 32px 32px;
      position: relative;
      z-index: 1;
    }

    /* Branding */
    .brand {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      width: 80px;
      height: 80px;
      filter: drop-shadow(0 4px 16px rgba(232, 87, 42, 0.25));
    }

    .brand h1 {
      font-size: 36px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
    }

    .brand p {
      font-size: 13px;
      color: #8888aa;
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Search */
    .search-wrapper {
      width: 100%;
      position: relative;
    }

    .search-bar {
      width: 100%;
      padding: 16px 20px 16px 52px;
      background: rgba(22, 33, 62, 0.8);
      border: 1.5px solid #2a2a4a;
      border-radius: 16px;
      color: #f0f0f0;
      font-size: 16px;
      outline: none;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
      backdrop-filter: blur(8px);
    }

    .search-bar::placeholder {
      color: #5a5a7a;
    }

    .search-bar:focus {
      border-color: #E8572A;
      box-shadow: 0 0 0 3px rgba(232, 87, 42, 0.15), 0 8px 32px rgba(0, 0, 0, 0.2);
      background: rgba(22, 33, 62, 0.95);
    }

    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #5a5a7a;
      pointer-events: none;
      transition: color 0.25s ease;
    }

    .search-bar:focus ~ .search-icon {
      color: #E8572A;
    }

    /* Quick Links */
    .quick-links {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      width: 100%;
    }

    @media (max-width: 480px) {
      .quick-links {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .quick-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 18px 12px;
      background: rgba(22, 33, 62, 0.6);
      border: 1px solid #2a2a4a;
      border-radius: 14px;
      text-decoration: none;
      color: #c0c0d0;
      transition: all 0.25s ease;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }

    .quick-link:hover {
      background: rgba(30, 45, 75, 0.8);
      border-color: #E8572A;
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      color: #f0f0f0;
    }

    .quick-link-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      transition: transform 0.2s ease;
    }

    .quick-link:hover .quick-link-icon {
      transform: scale(1.1);
    }

    .quick-link-label {
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    /* Footer */
    .footer {
      position: absolute;
      bottom: 20px;
      font-size: 11px;
      color: #3a3a5a;
      letter-spacing: 0.5px;
    }
  </style>
</head>

      var searchInput = document.getElementById('searchInput');

      searchInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          var query = searchInput.value.trim();
          if (query) {
            if (/^https?:\/\//i.test(query)) {
              window.location.href = query;
            } else if (/^[a-zA-Z0-9-]+\.[a-zA-Z]{2,}/.test(query)) {
              window.location.href = 'https://' + query;
            } else {
              window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(query);
            }
          }
        }
      });
    })();
  </script>
</body>
</html>
