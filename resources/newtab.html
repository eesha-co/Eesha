<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab - Eesha</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      max-width: 640px;
      width: 100%;
      padding: 32px;
    }

    /* Branding */
    .brand {
      text-align: center;
    }

    .brand h1 {
      font-size: 48px;
      font-weight: 700;
      color: #E8572A;
      letter-spacing: -1px;
      margin-bottom: 6px;
    }

    .brand p {
      font-size: 14px;
      color: #8888aa;
      font-weight: 300;
    }

    /* Search */
    .search-wrapper {
      width: 100%;
      position: relative;
    }

    .search-bar {
      width: 100%;
      padding: 16px 20px 16px 52px;
      background: #16213e;
      border: 1.5px solid #2a2a4a;
      border-radius: 14px;
      color: #f0f0f0;
      font-size: 16px;
      outline: none;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .search-bar::placeholder {
      color: #5a5a7a;
    }

    .search-bar:focus {
      border-color: #E8572A;
      box-shadow: 0 0 0 3px rgba(232, 87, 42, 0.2);
    }

    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #5a5a7a;
      pointer-events: none;
      transition: color 0.25s ease;
    }

    .search-bar:focus ~ .search-icon {
      color: #E8572A;
    }

    /* Quick Links */
    .quick-links {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      width: 100%;
    }

    @media (max-width: 480px) {
      .quick-links {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .quick-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 20px 12px;
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      text-decoration: none;
      color: #c0c0d0;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .quick-link:hover {
      background: #1a2747;
      border-color: #E8572A;
      transform: translateY(-2px);
      color: #f0f0f0;
    }

    .quick-link-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }

    .quick-link-label {
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    /* Footer */
    .footer {
      position: absolute;
      bottom: 20px;
      font-size: 11px;
      color: #4a4a6a;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Branding -->
    <div class="brand">
      <h1>Eesha</h1>
      <p>Fast. Private. Yours.</p>
    </div>

    <!-- Search Bar -->
    <div class="search-wrapper">
      <input
        type="text"
        class="search-bar"
        id="searchInput"
        placeholder="Search the web..."
        autocomplete="off"
        autofocus
      />
      <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
    </div>

    <!-- Quick Links -->
    <div class="quick-links">
      <a class="quick-link" href="https://www.google.com">
        <div class="quick-link-icon" style="background: #4285F4;">G</div>
        <span class="quick-link-label">Google</span>
      </a>
      <a class="quick-link" href="https://www.wikipedia.org">
        <div class="quick-link-icon" style="background: #636466;">W</div>
        <span class="quick-link-label">Wikipedia</span>
      </a>
      <a class="quick-link" href="https://github.com">
        <div class="quick-link-icon" style="background: #24292e;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
        </div>
        <span class="quick-link-label">GitHub</span>
      </a>
      <a class="quick-link" href="https://www.reddit.com">
        <div class="quick-link-icon" style="background: #FF4500;">R</div>
        <span class="quick-link-label">Reddit</span>
      </a>
      <a class="quick-link" href="https://www.youtube.com">
        <div class="quick-link-icon" style="background: #FF0000;">Y</div>
        <span class="quick-link-label">YouTube</span>
      </a>
      <a class="quick-link" href="https://news.ycombinator.com">
        <div class="quick-link-icon" style="background: #FF6600;">H</div>
        <span class="quick-link-label">Hacker News</span>
      </a>
      <a class="quick-link" href="https://stackoverflow.com">
        <div class="quick-link-icon" style="background: #F48024;">S</div>
        <span class="quick-link-label">Stack Overflow</span>
      </a>
      <a class="quick-link" href="https://www.mozilla.org">
        <div class="quick-link-icon" style="background: #000000;">M</div>
        <span class="quick-link-label">Mozilla</span>
      </a>
    </div>
  </div>

  <div class="footer">Eesha Browser &mdash; Powered by Servo</div>

  <script>
    (function() {
      var searchInput = document.getElementById('searchInput');

      searchInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          var query = searchInput.value.trim();
          if (query) {
            // Check if it looks like a URL
            if (/^https?:\/\//i.test(query)) {
              window.location.href = query;
            } else if (/^[a-zA-Z0-9-]+\.[a-zA-Z]{2,}/.test(query)) {
              // Looks like a domain, navigate directly
              window.location.href = 'https://' + query;
            } else {
              // Search with Google
              window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(query);
            }
          }
        }
      });
    })();
  </script>
</body>
</html>
